<div class="auth-wrapper">
  <div class="auth-container shadow-elevation">
    <!-- Visual Side (Editorial) -->
    <div class="auth-visual">
      <img
        src="https://res.cloudinary.com/dg7zm6lwk/image/upload/v1773522327/auth_background_editorial_1773521471172_rdebgk.png"
        alt="Editorial Brand Image">
      <div class="visual-overlay">
        <span class="brand-tag">{{ i18n.global.brand }}</span>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-content">
      <div class="auth-header">
        <h1 class="font-editorial text-4xl">{{ i18n.auth.title }}</h1>
        <p class="text-secondary">{{ i18n.auth.subtitle }}</p>
      </div>

      <form class="auth-form">
        <div class="form-group">
          <label class="label">{{ i18n.auth.form.email }}</label>
          <input type="email" [placeholder]="i18n.auth.form.emailPlaceholder" class="input shadow-sm">
        </div>

        <div class="form-group">
          <div class="label-row flex justify-between items-center">
            <label class="label">{{ i18n.auth.form.password }}</label>
            <a href="#" class="link-sm">{{ i18n.auth.form.forgotPassword }}</a>
          </div>
          <input type="password" [placeholder]="i18n.auth.form.passwordPlaceholder" class="input shadow-sm">
        </div>

        <div class="form-options flex items-center justify-between">
          <label class="checkbox-container">
            <input type="checkbox">
            <span class="checkmark"></span>
            <span class="text-secondary text-sm">{{ i18n.auth.form.rememberMe }}</span>
          </label>
        </div>

        <button type="button" class="btn btn-primary w-full shadow-elevation" routerLink="/">
          {{ i18n.auth.form.loginBtn }}
        </button>

        <div class="auth-footer">
          <span class="text-secondary text-sm">
            {{ i18n.auth.form.noAccount }}
            <a href="#" class="brand-link">{{ i18n.auth.form.createAccount }}</a>
          </span>
        </div>
      </form>
    </div>
  </div>
</div>
